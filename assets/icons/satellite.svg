<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 80; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-3 { 0% { stroke-dashoffset: 60; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 0.8s ease-in-out forwards; }
      .path-b { animation: draw-2 0.8s ease-in-out 0.15s forwards; }
      .path-c { animation: draw-3 0.8s ease-in-out 0.30s forwards; }
      .fill-x { animation: fill-1 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.7s forwards; opacity: 0; transform-origin: 12px 12px; }
      .pulse   { animation: pulse 2s ease-in-out 1.5s infinite; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.4s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Dish arc -->
    <path class="path-a" d="M12 4 C7 4 5 10 6 16" stroke-dasharray="50" stroke-dashoffset="50"/>
    <!-- Feed horn/antenna -->
    <path class="path-b" d="M12 4 l-3 8 C10 11 14 11 15 12 Z" stroke-dasharray="80" stroke-dashoffset="80"/>
    <!-- Base/stand -->
    <path class="path-c" d="M10 16 h4 M12 14 v4" stroke-dasharray="60" stroke-dashoffset="60"/>
    <!-- Signal waves -->
    <path class="path-c pulse" d="M15 10 C17 9 18 12 15 13" stroke-dasharray="60" stroke-dashoffset="60"/>
    <path class="path-c pulse" d="M17 8 C20 7 21 14 17 15" stroke-dasharray="60" stroke-dashoffset="60" style="animation-delay: 0.3s;"/>
  </g>
</svg>
