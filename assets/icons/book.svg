<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 60; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 60; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-3 { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 0.9s ease-in-out forwards; }
      .path-b { animation: draw-2 0.9s ease-in-out 0.15s forwards; }
      .path-c { animation: draw-3 0.9s ease-in-out 0.30s forwards; }
      .fill-x { animation: fill-1 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.8s forwards; opacity: 0; transform-origin: 12px 12px; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.6s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path class="path-a" d="M4 4 v16 C4 18 6 17 8 17 v-7 C6 10 4 11 4 9" stroke-dasharray="60" stroke-dashoffset="60"/>
    <!-- Right page -->
    <path class="path-b" d="M20 4 v16 C20 18 18 17 16 17 v-7 C18 10 20 11 20 9" stroke-dasharray="60" stroke-dashoffset="60"/>
    <!-- Spine line -->
    <path class="path-c" d="M12 4 v12" stroke-dasharray="50" stroke-dashoffset="50"/>
    <!-- Pages in middle (lines) -->
    <line class="path-c" x1="8" y1="10" x2="12" y2="10" stroke-dasharray="50" stroke-dashoffset="50"/>
    <line class="path-c" x1="12" y1="10" x2="16" y2="10" stroke-dasharray="50" stroke-dashoffset="50"/>
    <!-- Bookmark fill -->
    <path class="fill-x" d="M12 12 v6 l2 -1.5 l2 1.5 v-6" fill="#CC785C" stroke="none"/>
  </g>
</svg>
