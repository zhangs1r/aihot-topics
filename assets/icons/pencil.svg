<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 20; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 0.9s ease-in-out forwards; }
      .path-b { animation: draw-2 0.6s ease-in-out 0.15s forwards; }
      .fill-x { animation: fill-1 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.2s forwards; opacity: 0; transform-origin: 12px 12px; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.4s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path class="path-a" d="M8 4 h6 l-3 16 h-6 Z" stroke-dasharray="50" stroke-dashoffset="50"/>
    <path class="path-b" d="M5 20 l3 2 l3 -2" stroke-dasharray="20" stroke-dashoffset="20"/>
    <path class="fill-x" d="M6 20 l2 1.3 l2 -1.3" fill="#CC785C" stroke="none"/>
    <line class="path-b" x1="9" y1="6" x2="14" y2="6" stroke-dasharray="20" stroke-dashoffset="20"/>
  </g>
</svg>
