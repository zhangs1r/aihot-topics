<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 70; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 0.9s ease-in-out forwards; }
      .path-b { animation: draw-2 0.9s ease-in-out 0.15s forwards; }
      .fill-x { animation: fill-1 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.2s forwards; opacity: 0; transform-origin: 12px 12px; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.6s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path class="path-a" d="M4 6 h16 v14 H4 Z" stroke-dasharray="70" stroke-dashoffset="70"/>
    <line class="path-b" x1="4" y1="10" x2="20" y2="10" stroke-dasharray="50" stroke-dashoffset="50"/>
    <path class="path-b" d="M7 6 V4 M17 6 V4" stroke-dasharray="50" stroke-dashoffset="50"/>
    <rect class="fill-x" x="7" y="12" width="8" height="5" rx="1" fill="#CC785C" stroke="none"/>
    <line class="fill-x" x1="7" y1="12" x2="15" y2="12" stroke="#F7F4EE" stroke-width="1.2"/>
    <line class="fill-x" x1="7" y1="14" x2="12" y2="14" stroke="#F7F4EE" stroke-width="1.2"/>
  </g>
</svg>
