<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="48" height="48">
  <defs>
    <style>
      @keyframes draw { 0% { stroke-dashoffset:92; } 100% { stroke-dashoffset:0; } }
      @keyframes fpop { 0% { opacity:0; transform:scale(0); } 60% { opacity:1; transform:scale(1.2); } 100% { opacity:1; transform:scale(1); } }
      @keyframes bounce {
        0%   { transform:scale(1) rotate(0deg); }
        30%  { transform:scale(1.18) rotate(3deg); }
        55%  { transform:scale(0.92) rotate(-2deg); }
        78%  { transform:scale(1.06) rotate(1deg); }
        100% { transform:scale(1) rotate(0deg); }
      }
      .p0 { animation: draw 0.8333333333333334s ease-in-out 0.0s forwards; stroke-dasharray:50; stroke-dashoffset:50; }
      .p1 { animation: draw 1.5333333333333334s ease-in-out 0.15s forwards; stroke-dasharray:92; stroke-dashoffset:92; }
      .bx { animation: bounce 0.7s cubic-bezier(0.34,1.56,0.64,1) 1.8833333333333333s forwards; }
    </style>
  </defs>
  <g class="bx">
      <path class="p0" d="M6 9h3l4-5v16l-4-5H6V9z" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path class="p1" d="M14 9a3 3 0 0 1 0 6M17 7a6 6 0 0 1 0 10" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>