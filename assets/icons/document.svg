<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 60; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 1.0s ease-in-out forwards; }
      .path-b { animation: draw-2 1.0s ease-in-out 0.15s forwards; }
      .fill-x { animation: fill-1 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.8s forwards; opacity: 0; transform-origin: 12px 12px; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.6s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path class="path-a" d="M5 3 h8 l4 4 v14 H5 Z" stroke-dasharray="60" stroke-dashoffset="60"/>
    <path class="path-b" d="M13 3 v4 h4" stroke-dasharray="50" stroke-dashoffset="50"/>
    <line class="fill-x" x1="8" y1="10" x2="16" y2="10" stroke="#CC785C" opacity="0"/>
    <line class="fill-x" x1="8" y1="13" x2="14" y2="13" stroke="#CC785C" opacity="0"/>
    <line class="fill-x" x1="8" y1="16" x2="15" y2="16" stroke="#CC785C" opacity="0"/>
  </g>
</svg>
