<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 60; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 45; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-3 { 0% { stroke-dashoffset: 35; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 0.9s ease-in-out forwards; }
      .path-b { animation: draw-2 0.9s ease-in-out 0.15s forwards; }
      .path-c { animation: draw-3 0.9s ease-in-out 0.30s forwards; }
      .fill-x { animation: fill-1 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.6s forwards; opacity: 0; transform-origin: 12px 12px; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.5s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path class="path-a" d="M6 20 h12" stroke-dasharray="60" stroke-dashoffset="60"/>
    <path class="path-b" d="M14 20 v-7 C14 10 17 10 17 13 v3" stroke-dasharray="45" stroke-dashoffset="45"/>
    <path class="path-c" d="M8 13 h6" stroke-dasharray="35" stroke-dashoffset="35"/>
    <path class="path-c" d="M17 10 l2 -3" stroke-dasharray="35" stroke-dashoffset="35"/>
    <circle class="fill-x" cx="8" cy="11" r="1.5" fill="#CC785C" stroke="none"/>
  </g>
</svg>
