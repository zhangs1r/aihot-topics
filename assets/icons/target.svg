<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 70; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 30; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 1.0s ease-in-out forwards; }
      .path-b { animation: draw-2 0.6s ease-in-out 0.15s forwards; }
      .fill-x { animation: fill-1 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.2s forwards; opacity: 0; transform-origin: 12px 12px; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.7s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle class="path-a" cx="12" cy="12" r="9" stroke-dasharray="70" stroke-dashoffset="70"/>
    <line class="path-b" x1="3" y1="12" x2="21" y2="12" stroke-dasharray="30" stroke-dashoffset="30"/>
    <line class="path-b" x1="12" y1="3" x2="12" y2="21" stroke-dasharray="30" stroke-dashoffset="30"/>
    <circle class="fill-x" cx="12" cy="12" r="3" fill="#CC785C" stroke="none"/>
    <circle class="path-b" cx="12" cy="12" r="6" stroke-dasharray="30" stroke-dashoffset="30"/>
  </g>
</svg>
