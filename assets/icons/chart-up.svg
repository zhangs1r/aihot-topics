<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="48" height="48">
  <defs>
    <style>
      @keyframes draw { 0% { stroke-dashoffset:48; } 100% { stroke-dashoffset:0; } }
      @keyframes fpop { 0% { opacity:0; transform:scale(0); } 60% { opacity:1; transform:scale(1.2); } 100% { opacity:1; transform:scale(1); } }
      @keyframes bounce {
        0%   { transform:scale(1) rotate(0deg); }
        30%  { transform:scale(1.18) rotate(3deg); }
        55%  { transform:scale(0.92) rotate(-2deg); }
        78%  { transform:scale(1.06) rotate(1deg); }
        100% { transform:scale(1) rotate(0deg); }
      }
      .p0 { animation: draw 0.6s ease-in-out 0.0s forwards; stroke-dasharray:20; stroke-dashoffset:20; }
      .p1 { animation: draw 0.8s ease-in-out 0.15s forwards; stroke-dasharray:48; stroke-dashoffset:48; }
      .bx { animation: bounce 0.7s cubic-bezier(0.34,1.56,0.64,1) 1.1500000000000001s forwards; }
    </style>
  </defs>
  <g class="bx">
      <path class="p0" d="M4 20h16" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path class="p1" d="M6 16v-2M10 16v-6M14 16v-8M18 16v-4" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>