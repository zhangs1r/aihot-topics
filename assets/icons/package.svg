<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 70; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 30; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-3 { 0% { stroke-dashoffset: 30; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 1.0s ease-in-out forwards; }
      .path-b { animation: draw-2 0.6s ease-in-out 0.15s forwards; }
      .path-c { animation: draw-3 0.6s ease-in-out 0.30s forwards; }
      .fill-x { animation: fill-1 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.8s forwards; opacity: 0; transform-origin: 12px 12px; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.5s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path class="path-a" d="M4 7 l8 -4 l8 4" stroke-dasharray="70" stroke-dashoffset="70"/>
    <path class="path-a" d="M4 7 v10 l8 4 v-10 M20 7 v10 l-8 4" stroke-dasharray="70" stroke-dashoffset="70"/>
    <path class="path-b" d="M6 9 h12" stroke-dasharray="30" stroke-dashoffset="30"/>
    <path class="path-c" d="M10 12 h4" stroke-dasharray="30" stroke-dashoffset="30"/>
    <rect class="fill-x" x="6" y="8" width="2" height="5" rx="0.5" fill="#CC785C" stroke="none" opacity="0.2"/>
  </g>
</svg>
