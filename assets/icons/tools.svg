<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 55; } 100% { stroke-dashoffset: 0; } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 0.9s ease-in-out forwards; }
      .path-b { animation: draw-2 0.9s ease-in-out 0.15s forwards; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.4s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <g>
      <line x1="8" y1="6" x2="14" y2="20" stroke-dasharray="50" stroke-dashoffset="50" class="path-a"/>
      <path d="M6 4 l5 -1 l2 4 l-5 1 Z" stroke-dasharray="50" stroke-dashoffset="50" class="path-a"/>
    </g>
    <g>
      <line x1="18" y1="6" x2="10" y2="18" stroke-dasharray="55" stroke-dashoffset="55" class="path-b"/>
      <path d="M18 6 C21 8 20 12 16 11 C14 10 13 8 15 5" stroke-dasharray="55" stroke-dashoffset="55" class="path-b"/>
    </g>
  </g>
</svg>
