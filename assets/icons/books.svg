<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 40; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 45; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-3 { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 0.7s ease-in-out forwards; }
      .path-b { animation: draw-2 0.7s ease-in-out 0.15s forwards; }
      .path-c { animation: draw-3 0.7s ease-in-out 0.30s forwards; }
      .fill-x { animation: fill-1 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.6s forwards; opacity: 0; transform-origin: 12px 12px; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.3s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path class="path-a" d="M4 17 h16 v-4 H4 Z" stroke-dasharray="40" stroke-dashoffset="40"/>
    <path class="path-b" d="M6 13 h14 v-4 H6 Z" stroke-dasharray="45" stroke-dashoffset="45"/>
    <path class="path-c" d="M5 9 h16 v-4 H5 Z" stroke-dasharray="50" stroke-dashoffset="50"/>
    <path class="fill-x" d="M14 9 v3 l-1.5 -1 l-1.5 1 v-3" fill="#CC785C" stroke="none"/>
  </g>
</svg>
