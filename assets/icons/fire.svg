<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 60; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 0.9s ease-in-out forwards; }
      .path-b { animation: draw-2 0.9s ease-in-out 0.15s forwards; }
      .fill-x { animation: fill-1 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.6s forwards; opacity: 0; transform-origin: 10px 15px; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.3s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#D4A853" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path class="path-a" d="M12 3 C12 3 7 10 7 14 C7 17.5 9.5 20 12 20 C14.5 20 17 17.5 17 14 C17 10 12 3 12 3 Z" stroke-dasharray="60" stroke-dashoffset="60"/>
    <path class="path-b" d="M12 8 C12 8 10 12 10 14 C10 15.5 11 17 12 17 C13 17 14 15.5 14 14 C14 12 12 8 12 8 Z" stroke-dasharray="50" stroke-dashoffset="50"/>
    <circle class="fill-x" cx="12" cy="14" r="1.5" fill="#D4A853" stroke="none"/>
  </g>
</svg>
