<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <style>
      @keyframes draw-1 { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-2 { 0% { stroke-dashoffset: 30; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-3 { 0% { stroke-dashoffset: 25; } 100% { stroke-dashoffset: 0; } }
      @keyframes draw-4 { 0% { stroke-dashoffset: 20; } 100% { stroke-dashoffset: 0; } }
      @keyframes fill-1 { 0% { opacity: 0; transform: scaleY(0); } 60% { opacity: 1; transform: scaleY(1); } 100% { opacity: 1; transform: scaleY(1); } }
      @keyframes bounce {
        0%   { transform: scale(1) rotate(0deg); }
        30%  { transform: scale(1.18) rotate(3deg); }
        55%  { transform: scale(0.92) rotate(-2deg); }
        78%  { transform: scale(1.06) rotate(1deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      .path-a { animation: draw-1 0.8s ease-in-out forwards; }
      .path-b { animation: draw-2 0.8s ease-in-out 0.15s forwards; }
      .path-c { animation: draw-3 0.8s ease-in-out 0.30s forwards; }
      .path-d { animation: draw-4 0.8s ease-in-out 0.45s forwards; }
      .fill-x { animation: fill-1 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.6s forwards; opacity: 0; transform-origin: bottom; }
      .bounce { animation: bounce 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.5s forwards; transform-origin: center; }
    </style>
  </defs>
  <g class="bounce" fill="none" stroke="#CC785C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path class="path-a" d="M4 18 h16 M4 18 v-12" stroke-dasharray="50" stroke-dashoffset="50"/>
    <path class="path-b" d="M7 18 V12 h3 v6" stroke-dasharray="30" stroke-dashoffset="30"/>
    <path class="path-c" d="M12 18 V9 h3 v9" stroke-dasharray="25" stroke-dashoffset="25"/>
    <path class="path-d" d="M17 18 V6 h3 v12" stroke-dasharray="20" stroke-dashoffset="20"/>
    <rect class="fill-x" x="7" y="12" width="3" height="6" fill="#CC785C" stroke="none" opacity="0.15"/>
    <rect class="fill-x" x="12" y="9" width="3" height="9" fill="#CC785C" stroke="none" opacity="0.15" style="animation-delay: 0.15s;"/>
    <rect class="fill-x" x="17" y="6" width="3" height="12" fill="#CC785C" stroke="none" opacity="0.15" style="animation-delay: 0.30s;"/>
  </g>
</svg>
